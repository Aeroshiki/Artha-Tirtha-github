<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Segera Hadir</title>
  <link rel="stylesheet" href="assets/css/csoon.css" />
</head>
<body>

  <main class="mobile-wrapper">
    <section class="coming-soon-card">

      <div class="badge">
        <span>🚀</span>
      </div>

      <div class="top-glow"></div>

      <div class="content">
        <p class="mini-label">Website Baru</p>
        <h1>SEGERA <span>HADIR</span></h1>
        <p class="description">
          Website masih dalam tahap pengembangan
        </p>

        <div class="countdown-box">
          <div class="count-item">
            <h2 id="days">00</h2>
            <p>Hari</p>
          </div>
          <div class="count-item">
            <h2 id="hours">00</h2>
            <p>Jam</p>
          </div>
          <div class="count-item">
            <h2 id="minutes">00</h2>
            <p>Menit</p>
          </div>
          <div class="count-item">
            <h2 id="seconds">00</h2>
            <p>Detik</p>
          </div>
        </div>

        <div class="button-group">
          <a href="index.html" class="btn-secondary">Kembali</a>
        </div>
      </div>

    </section>
  </main>

  <script src="assets/js/coming-soon.js"></script>
</body>
</html>
