<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomor ID Pelanggan PLN</title>
    <!-- Kita menggunakan CSS pelanggan.css sebagai layout standar -->
    <link rel="stylesheet" href="assets/css/pelanggan.css">
    <style>
        .id-pln-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 32px 16px 40px;
        }

        .card-image {
            width: 100%;
            max-width: 320px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
            margin-bottom: 28px;
            transition: transform 0.3s ease;
            object-fit: cover;
            background-color: #e5e7eb; /* Placeholder color in case image is missing */
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7280;
            font-size: 14px;
        }

        .card-image:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.18);
        }

        .id-pln-box {
            background: #f8fbff;
            border: 2px dashed #2d8cf0;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 320px;
            margin-bottom: 32px;
            box-shadow: 0 4px 15px rgba(45, 140, 240, 0.08);
            position: relative;
            overflow: hidden;
        }

        /* Subtle glowing effect */
        .id-pln-box::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, #2d8cf0, #00d2ff);
        }

        .id-pln-label {
            font-size: 13px;
            color: #4b5563;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .id-pln-number {
            font-size: 32px;
            font-weight: 900;
            color: #1f2937;
            letter-spacing: 3px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .btn-kembali {
            display: inline-block;
            background: #2d8cf0;
            color: white;
            text-decoration: none;
            padding: 16px 28px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 6px 16px rgba(45, 140, 240, 0.25);
            transition: all 0.2s ease;
            width: 100%;
            max-width: 320px;
            letter-spacing: 0.5px;
        }

        .btn-kembali:hover {
            background: #1e70c8;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(45, 140, 240, 0.3);
        }
        
        .btn-kembali:active {
            transform: translateY(0);
        }
    </style>
</head>
<body style="background: #f3f6fb;">
    <div class="pelanggan-page" style="min-height: 100vh; display: flex; flex-direction: column;">
        <header class="pelanggan-header" style="height: 140px; padding-top: 24px; border-radius: 0 0 32px 32px;">
            <div class="header-overlay"></div>
            <a href="index.html" class="back-btn" style="text-decoration: none; display: flex; align-items: center; justify-content: center; left: 24px; top: 24px;">‹</a>
            <h1 style="position: relative; z-index: 2; color: white; margin-top: 6px; font-size: 22px;">ID Pelanggan PLN</h1>
        </header>

        <main class="pelanggan-content id-pln-container" style="flex: 1; margin-top: -30px; z-index: 10; border-radius: 32px 32px 0 0; min-height: auto; width: 100%; max-width: 480px;">
            
            <!-- Gambar Kartu Member PLN -->
            <img src="assets/img/card-pln.png" alt="Kartu Member PLN" class="card-image" onerror="this.onerror=null; this.src=''; this.alt='Gambar Kartu Belum Tersedia';">

            <!-- Box Nomor ID PLN -->
            <div class="id-pln-box">
                <div class="id-pln-label">ID Pelanggan PLN</div>
                <div class="id-pln-number">523071525119</div>
            </div>

            <!-- Tombol Kembali -->
            <a href="index.html" class="btn-kembali">Kembali ke Menu Utama</a>
        </main>
    </div>
</body>
</html>
