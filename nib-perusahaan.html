<!DOCTYPE html>

    <style>
        .nib-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 32px 18px 40px;
        }

        .doc-illustration {
            width: 120px;
            height: 120px;
            background: rgba(45, 140, 240, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            animation: pulse-ring 2s infinite;
        }

        .doc-illustration svg {
            width: 50px;
            height: 50px;
            fill: #2d8cf0;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(45, 140, 240, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(45, 140, 240, 0); }
            100% { box-shadow: 0 0 0 0 rgba(45, 140, 240, 0); }
        }

        .nib-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 340px;
            margin-bottom: 32px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            position: relative;
        }

        .company-name {
            font-size: 20px;
            font-weight: 800;
            color: #111827;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .doc-title {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .file-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #f8fbff;
            padding: 12px;
            border-radius: 12px;
            border: 1px dashed #bfdbfe;
            margin-bottom: 24px;
        }

        .file-info span {
            font-size: 13px;
            color: #3b82f6;
            font-weight: 600;
        }

        .file-info svg {
            width: 20px;
            height: 20px;
            fill: #3b82f6;
        }

        .btn-download {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #10b981;
            color: white;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.25);
            transition: all 0.2s ease;
            width: 100%;
            border: none;
            cursor: pointer;
        }

        .btn-download:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.35);
        }

        .btn-kembali {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f3f4f6;
            color: #4b5563;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.2s ease;
            width: 100%;
            max-width: 340px;
            border: 1px solid #d1d5db;
        }

        .btn-kembali:hover {
            background: #e5e7eb;
            color: #1f2937;
        }

</head>
